name: Release native binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  prepare-release:
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve tag
        id: resolve
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+)*([.-].*)?$ ]]; then
            echo "invalid release tag: $tag" >&2
            exit 2
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve.outputs.tag }}
      - name: Create release if needed
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            exit 0
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Native jbacon binaries for $TAG."

  build:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux-x86_64
          - os: ubuntu-22.04-arm
            target: linux-aarch64
          - os: macos-15-intel
            target: macos-x86_64
          - os: macos-14
            target: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller
      - name: Run parser tests
        run: python tests/parser_test.py
      - name: Build native archive
        env:
          JBACON_VERSION: ${{ needs.prepare-release.outputs.tag }}
          JBACON_TARGET: ${{ matrix.target }}
        run: ./scripts/build-native.sh
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: gh release upload "$TAG" "dist/jbacon-$TAG-$TARGET.tar.gz" --clobber
